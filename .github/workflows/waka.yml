name: WakaTime Card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: wakatime-card-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-wakatime-card:
    name: Update WakaTime SVG card
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Sync with latest master
        run: |
          git fetch origin master
          git pull --rebase origin master

      - name: Generate WakaTime card
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python3 scripts/generate-wakatime-card.py

      - name: Commit and push updated WakaTime card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/wakatime-stats.svg

          if git diff --cached --quiet; then
            echo "No WakaTime card changes to commit."
            exit 0
          fi

          git commit -m "Update WakaTime stats card"
          git push origin HEAD:master
