name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs at 12am UTC
    # Runs at 12pm UTC
    # Runs at 6pm UTC
    # Runs at 6am UTC
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest

    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          SHOW_TITLE: true
          TIME_RANGE: last_30_days
          LANG_COUNT: 5
          SHOW_TIME: true
          SHOW_TOTAL: true
