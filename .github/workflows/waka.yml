name: WakaTime Card

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  update-wakatime-card:
    name: Update WakaTime SVG card
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate WakaTime card
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python3 scripts/generate-wakatime-card.py

      - name: Commit updated WakaTime card
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update WakaTime stats card
          file_pattern: assets/wakatime-stats.svg
