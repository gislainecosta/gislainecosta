name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs at 12am UTC
    # Runs at 12pm UTC
    # Runs at 6pm UTC
    # Runs at 6am UTC
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-wakatime-card:
    name: Update WakaTime SVG card
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate WakaTime card
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python scripts/generate-wakatime-card.py

      - name: Commit updated WakaTime card
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update WakaTime stats card
          file_pattern: assets/wakatime-stats.svg
