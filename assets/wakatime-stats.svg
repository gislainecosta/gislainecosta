<svg width="500" height="300" viewBox="0 0 500 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font: 700 26px Arial, Helvetica, sans-serif;
      fill: #61dafb;
    }
    .subtitle {
      font: 600 13px Arial, Helvetica, sans-serif;
      fill: #ffffff;
      opacity: 0.85;
    }
    .label {
      font: 600 15px Arial, Helvetica, sans-serif;
      fill: #ffffff;
    }
    .value {
      font: 600 14px Arial, Helvetica, sans-serif;
      fill: #ffffff;
      opacity: 0.9;
    }
    .percent {
      font: 600 14px Arial, Helvetica, sans-serif;
      fill: #ffffff;
      opacity: 0.75;
      text-anchor: end;
    }
    .total {
      font: 700 18px Arial, Helvetica, sans-serif;
      fill: #61dafb;
    }
  </style>

  <rect width="500" height="300" rx="8" fill="#20232a" />

  <text x="40" y="54" class="title">WakaTime</text>
  <text x="40" y="80" class="subtitle">De 30 abr. 2025 até 30 abr. 2026</text>

  <rect x="42" y="104" width="430" height="10" rx="5" fill="#161b22" />
  <rect x="42.00" y="104" width="186.57" height="10" rx="5" fill="#61dafb" /><rect x="228.57" y="104" width="60.32" height="10" rx="5" fill="#3178c6" /><rect x="288.89" y="104" width="45.15" height="10" rx="5" fill="#f7df1e" /><rect x="334.04" y="104" width="30.32" height="10" rx="5" fill="#e34f26" /><rect x="364.36" y="104" width="26.13" height="10" rx="5" fill="#8cc84b" />

  
  <circle cx="52" cy="141" r="6" fill="#61dafb" />
  <text x="68" y="146" class="label">TypeScript</text>
  <text x="300" y="146" class="value">25 h 21 min</text>
  <text x="448" y="146" class="percent">43.4%</text>

  <circle cx="52" cy="171" r="6" fill="#3178c6" />
  <text x="68" y="176" class="label">HTML</text>
